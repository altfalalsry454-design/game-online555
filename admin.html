<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المطلقة للأدمن - Zero</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0d1117; color: #ffffff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .admin-box { background-color: #161b22; padding: 40px; border-radius: 10px; border: 1px solid #ff4757; width: 100%; max-width: 550px; text-align: center; box-shadow: 0 10px 30px rgba(255, 71, 87, 0.2); }
        .input-group { text-align: right; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #8b949e; font-weight: bold; font-size: 14px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; box-sizing: border-box; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; font-size: 16px; }
        .input-group input:focus { border-color: #ff4757; outline: none; }
        button { width: 100%; padding: 14px; background-color: #ff4757; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        button:hover { background-color: #ff6b81; }
        #adminAlert { margin-top: 20px; padding: 12px; border-radius: 5px; display: none; background-color: #23863652; color: #238636; border: 1px solid #238636; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1 style="color:#ff4757; margin-top: 0; margin-bottom:10px;">🖥️ لوحة التحكم (Zero)</h1>
        
        <div class="input-group">
            <label>تعديل مسمى فريق اللصوص</label>
            <input type="text" id="thiefRoleName" placeholder="مثال: الحرامي المحترف">
        </div>

        <button onclick="saveSettings()">حفظ الإعدادات</button>
        <div id="adminAlert">تم الحفظ بنجاح!</div>
    </div>

    <script>
        // الإعدادات الموحدة للمشروع
        const firebaseConfig = {
            apiKey: "AIzaSyDzh9haIp8fLivWBGIGTMZShiL5YV-3fKQ",
            authDomain: "zero-feea1.firebaseapp.com",
            projectId: "zero-feea1",
            storageBucket: "zero-feea1.firebasestorage.app",
            messagingSenderId: "51578202386",
            appId: "1:51578202386:web:d75b98548d27ea8342abcb",
            measurementId: "G-7Y4N19BK10"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveSettings() {
            const thiefName = document.getElementById('thiefRoleName').value;
            db.ref('settings/thiefName').set(thiefName).then(() => {
                const alert = document.getElementById('adminAlert');
                alert.style.display = 'block';
                setTimeout(() => { alert.style.display = 'none'; }, 2000);
            });
        }
    </script>
</body>
</html>
