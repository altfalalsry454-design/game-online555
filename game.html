<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة اللعبة - الحرامي والبنك</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; padding-top: 70px; }
        header { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background-color: #161b22; border-bottom: 2px solid #30363d; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #ff4757; }
        .user-tag { font-size: 14px; color: #58a6ff; }
        .main-wrapper { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .screen { display: none; }
        .active-screen { display: block; }
        .lobby-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .input-field { width: 100%; padding: 12px; background-color: #010409; border: 1px solid #30363d; border-radius: 6px; color: #fff; margin: 10px 0; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-green { background-color: #238636; color: white; }
        .btn-blue { background-color: #1f6feb; color: white; }
        .btn-red { background-color: #da3637; color: white; }
        .rooms-grid { background-color: #010409; border: 1px solid #30363d; border-radius: 6px; min-height: 100px; padding: 10px; }
        .room-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #21262d; }
        .room-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .room-layout { grid-template-columns: 1fr; } }
        .chat-messages { height: 250px; overflow-y: auto; background: #010409; border: 1px solid #30363d; padding: 10px; border-radius: 6px; }
        #alertBox { padding: 15px; border-radius: 6px; margin-bottom: 15px; display: none; text-align: center; }
        .alert-error { background: #8b2d2d; color: #ffcccc; }
        .alert-success { background: #238636; color: #ffffff; }
    </style>
</head>
<body>

    <header>
        <div class="logo">الحرامي والبنك 💰</div>
        <div class="user-tag">👤 <span id="myUsernameDisplay">-</span></div>
    </header>

    <div class="main-wrapper">
        <div id="alertBox"></div>

        <div id="lobbyScreen" class="screen active-screen">
            <div class="lobby-card">
                <h3>➕ إنشاء روم جديدة</h3>
                <input type="text" id="newRoomName" class="input-field" placeholder="اسم الروم...">
                <button class="btn btn-green" onclick="createRoomAction()">إنشاء الروم</button>
            </div>
            <div class="lobby-card">
                <h3>🚪 الرومات المتاحة</h3>
                <div class="rooms-grid" id="roomsContainer">جاري تحميل الرومات...</div>
                <button class="btn btn-blue" onclick="refreshRoomsList()">تحديث القائمة</button>
            </div>
        </div>

        <div id="roomScreen" class="screen">
            <div class="lobby-card">
                <h2 id="roomTitle">اسم الروم</h2>
                <p>كود الدخول: <strong id="roomCode" style="color:#f1c40f;">-</strong></p>
            </div>
            <div class="room-layout">
                <div>
                    <h3>👤 اللاعبون</h3>
                    <div id="playersContainer"></div>
                    <div id="ownerControls" style="display:none;">
                        <button class="btn btn-green" onclick="startGameAction()">🚀 ابدأ اللعبة</button>
                    </div>
                </div>
                <div>
                    <h3>💬 الشات</h3>
                    <div class="chat-messages" id="chatMessagesContainer"></div>
                    <input type="text" id="chatMessageInput" class="input-field" placeholder="رسالتك...">
                    <button class="btn btn-blue" onclick="sendChatMessage()">إرسال</button>
                </div>
            </div>
            <button class="btn btn-red" onclick="leaveRoomAction()">🚪 مغادرة الروم</button>
        </div>
    </div>

    <script>
        // الإعدادات المصححة والموحدة للمشروع
        const firebaseConfig = {
            apiKey: "AIzaSyDzh9haIp8fLivWBGIGTMZShiL5YV-3fKQ",
            authDomain: "zero-feea1.firebaseapp.com",
            projectId: "zero-feea1",
            storageBucket: "zero-feea1.firebasestorage.app",
            messagingSenderId: "51578202386",
            appId: "1:51578202386:web:d75b98548d27ea8342abcb",
            measurementId: "G-7Y4N19BK10"
        };
        
        firebase.initializeApp(firebaseConfig);

        const myUsername = "لاعب_" + Math.floor(Math.random() * 9000);
        document.getElementById('myUsernameDisplay').innerText = myUsername;
        let dbRef = firebase.database();
        let currentRoomId = null;

        function triggerAlert(msg, isError = false) {
            const box = document.getElementById('alertBox');
            box.innerText = msg;
            box.className = isError ? "alert-error" : "alert-success";
            box.style.display = "block";
            setTimeout(() => { box.style.display = "none"; }, 3000);
        }

        function createRoomAction() {
            const name = document.getElementById('newRoomName').value;
            if (!name) return triggerAlert("أدخل اسم الروم", true);
            const code = Math.floor(1000 + Math.random() * 9000);
            const newRoom = dbRef.ref('rooms').push();
            newRoom.set({ name, code, owner: myUsername }).then(() => {
                joinRoom(newRoom.key, name, code, true);
            });
        }

        function joinRoom(roomId, name, code, isOwner) {
            currentRoomId = roomId;
            dbRef.ref('rooms/' + roomId + '/players').push({ name, role: isOwner ? 'Owner' : 'Player' });
            document.getElementById('roomTitle').innerText = name;
            document.getElementById('roomCode').innerText = code;
            document.getElementById('ownerControls').style.display = isOwner ? 'block' : 'none';
            document.getElementById('lobbyScreen').classList.remove('active-screen');
            document.getElementById('roomScreen').classList.add('active-screen');
            
            dbRef.ref('rooms/' + roomId + '/players').on('value', snap => {
                const players = snap.val();
                document.getElementById('playersContainer').innerHTML = Object.values(players || {}).map(p => `<div>👤 ${p.name} ${p.role === 'Owner' ? '👑' : ''}</div>`).join('');
            });
        }

        function sendChatMessage() {
            const input = document.getElementById('chatMessageInput');
            if (input.value && currentRoomId) {
                dbRef.ref('rooms/' + currentRoomId + '/chat').push({ user: myUsername, text: input.value });
                input.value = "";
            }
        }

        function refreshRoomsList() {
            dbRef.ref('rooms').once('value', snap => {
                const rooms = snap.val();
                const cont = document.getElementById('roomsContainer');
                cont.innerHTML = "";
                for (let id in rooms) {
                    cont.innerHTML += `<div class="room-row">${rooms[id].name} <button class="btn btn-blue" onclick="joinRoom('${id}', '${rooms[id].name}', ${rooms[id].code}, false)">دخول</button></div>`;
                }
            });
        }

        function leaveRoomAction() {
            if (currentRoomId) {
                const roomRef = dbRef.ref('rooms/' + currentRoomId);
                roomRef.child('players').once('value', snap => {
                    const players = snap.val();
                    for(let id in players) {
                        if(players[id].name === myUsername) roomRef.child('players/' + id).remove();
                    }
                });
                roomRef.child('players').once('value', snap => {
                    if (!snap.exists()) roomRef.remove();
                    location.reload();
                });
            } else {
                location.reload();
            }
        }

        function startGameAction() { triggerAlert("بدأت اللعبة!"); }

        refreshRoomsList();
    </script>
</body>
</html>
