<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كليك بنك: صراع المليار</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #1e293b;
            --primary-green: #10b981;
            --danger-red: #ef4444;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            color: var(--primary-green);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        #timer {
            font-size: 1.5rem;
            background: var(--panel-bg);
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid var(--primary-green);
        }

        /* شاشة اللعبة المقسمة */
        .game-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            gap: 20px;
        }

        .player-panel {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* تأثير قفل الـ ATM */
        .player-panel.frozen {
            border: 2px solid var(--danger-red);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .player-panel.frozen::before {
            content: "⚠️ البنك مُعطل!";
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--danger-red);
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .panel-title {
            font-size: 1.5rem;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        .money {
            color: var(--primary-green);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* الأزرار الكبيرة */
        .click-btn {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .click-btn:active {
            transform: scale(0.98);
        }

        /* أقسام المتجر */
        .section-title {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-top: 10px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .shop-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .shop-btn:hover {
            background: #475569;
        }

        .shop-btn:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            border: 1px solid #334155;
        }

        .shop-btn span {
            font-weight: bold;
            color: #cbd5e1;
            margin-top: 4px;
        }

        /* أزرار الهجوم */
        .attack-btn {
            background: #7f1d1d;
            border: 1px solid var(--danger-red);
        }
        .attack-btn:hover {
            background: #b91c1c;
        }
    </style>
</head>
<body>

    <header>
        <h1>كليك بنك 💸</h1>
        <div id="timer">الوقت المتبقي: 90 ثانية</div>
    </header>

    <div class="game-container">
        <!-- بنك اللاعب (أنت) -->
        <div class="player-panel" id="player-panel">
            <div class="panel-title">🏦 بنكك (اللاعب 1)</div>
            <div class="stats">
                <div>الرصيد: <span class="money" id="p1-money">$0</span></div>
                <div>الدخل/ثانية: <span id="p1-mps">+$0</span></div>
            </div>
            
            <button class="click-btn" onclick="playerClick()">💰 إيداع سريع (+10$)</button>

            <div class="section-title">🏢 متجر التطويرات (زيادة الدخل)</div>
            <div class="btn-grid">
                <button class="shop-btn" id="p1-up1" onclick="buyUpgrade('teller')">موظف بنك<span>$200 (+5$/ث)</span></button>
                <button class="shop-btn" id="p1-up2" onclick="buyUpgrade('atm')">ماكينة ATM<span>$1,000 (+25$/ث)</span></button>
            </div>

            <div class="section-title">⚔️ متجر الهجوم (اضرب المنافس)</div>
            <div class="btn-grid">
                <button class="shop-btn attack-btn" id="p1-atk1" onclick="launchAttack('drain')">سحب عشوائي<span>$500</span></button>
                <button class="shop-btn attack-btn" id="p1-atk2" onclick="launchAttack('freeze')">قفل الـ ATM<span>$2,000</span></button>
            </div>
        </div>

        <!-- بنك المنافس (الكمبيوتر) -->
        <div class="player-panel" id="enemy-panel">
            <div class="panel-title">🤖 بنك المنافس (الكمبيوتر)</div>
            <div class="stats">
                <div>الرصيد: <span class="money" id="p2-money">$0</span></div>
                <div>الدخل/ثانية: <span id="p2-mps">+$0</span></div>
            </div>
            
            <button class="click-btn" style="background: #475569; cursor: not-allowed;" disabled>جاري اللعب أونلاين...</button>

            <div class="section-title">🏢 تطويرات المنافس</div>
            <div class="btn-grid">
                <button class="shop-btn" id="p2-up1" disabled>موظف بنك<span>+5$/ث</span></button>
                <button class="shop-btn" id="p2-up2" disabled>ماكينة ATM<span>+25$/ث</span></button>
            </div>

            <div class="section-title">⚔️ هجمات المنافس</div>
            <div class="btn-grid">
                <button class="shop-btn attack-btn" id="p2-atk1" disabled>سحب عشوائي</button>
                <button class="shop-btn attack-btn" id="p2-atk2" disabled>قفل الـ ATM</button>
            </div>
        </div>
    </div>

    <script>
        // بيانات اللعبة
        let gameTime = 90; 
        let gameActive = true;

        let p1 = { money: 0, mps: 0, isFrozen: false, freezeTimer: 0 };
        let p2 = { money: 0, mps: 0, isFrozen: false, freezeTimer: 0 };

        // أسعار وتفاصيل المتجر
        const prices = {
            teller: 200,
            atm: 1000,
            drainCost: 500,
            freezeCost: 2000
        };

        // الـ Loop الرئيسي للعبة (يشتغل كل ثانية)
        const gameLoop = setInterval(() => {
            if (!gameActive) return;

            // 1. تقليل وقت اللعبة
            gameTime--;
            document.getElementById('timer').innerText = `الوقت المتبقي: ${gameTime} ثانية`;

            if (gameTime <= 0) {
                endGame();
                return;
            }

            // 2. حساب الدخل التلقائي للاعب 1 (لو مش متجمد)
            if (!p1.isFrozen) {
                p1.money += p1.mps;
            } else {
                p1.freezeTimer--;
                if (p1.freezeTimer <= 0) {
                    p1.isFrozen = false;
                    document.getElementById('player-panel').classList.remove('frozen');
                }
            }

            // 3. حساب الدخل التلقائي للاعب 2 (المنافس)
            if (!p2.isFrozen) {
                p2.money += p2.mps;
            } else {
                p2.freezeTimer--;
                if (p2.freezeTimer <= 0) {
                    p2.isFrozen = false;
                    document.getElementById('enemy-panel').classList.remove('frozen');
                }
            }

            // 4. ذكاء اصطناعي بسيط للمنافس (عشان يحاكي لاعب حقيقي)
            enemyAI();

            // 5. تحديث الشاشة والأزرار
            updateUI();

        }, 1000);

        // الضغط اليدوي للاعب
        function playerClick() {
            if (!gameActive || p1.isFrozen) return;
            p1.money += 10;
            updateUI();
        }

        // شراء التطويرات للاعب 1
        function buyUpgrade(type) {
            if (p1.money >= prices[type]) {
                p1.money -= prices[type];
                if (type === 'teller') p1.mps += 5;
                if (type === 'atm') p1.mps += 25;
                updateUI();
            }
        }

        // إطلاق الهجمات من اللاعب 1
        function launchAttack(type) {
            if (type === 'drain' && p1.money >= prices.drainCost) {
                p1.money -= prices.drainCost;
                // يسرق 1000$ أو كل كاش المنافس لو معاه أقل
                let stolen = Math.min(1000, p2.money);
                p2.money -= stolen;
                p1.money += stolen;
            } 
            else if (type === 'freeze' && p1.money >= prices.freezeCost) {
                p1.money -= prices.freezeCost;
                p2.isFrozen = true;
                p2.freezeTimer = 5; // تجميد 5 ثواني
                document.getElementById('enemy-panel').classList.add('frozen');
            }
            updateUI();
        }

        // ذكاء اصطناعي للمنافس (تصرفات عشوائية ذكية)
        function enemyAI() {
            // الكمبيوتر بيجمع فلوس يدوي كأنه بيضغط بسرعة
            if (!p2.isFrozen) p2.money += Math.floor(Math.random() * 3) * 10;

            // يقرر يشتري أو يهاجم حسب فلوسه
            if (p2.money >= prices.freezeCost && Math.random() > 0.6) {
                p2.money -= prices.freezeCost;
                p1.isFrozen = true;
                p1.freezeTimer = 5;
                document.getElementById('player-panel').classList.add('frozen');
            } else if (p2.money >= prices.atm && Math.random() > 0.5) {
                p2.money -= prices.atm;
                p2.mps += 25;
            } else if (p2.money >= prices.teller && Math.random() > 0.4) {
                p2.money -= prices.teller;
                p2.mps += 5;
            } else if (p2.money >= prices.drainCost && Math.random() > 0.7) {
                p2.money -= prices.drainCost;
                let stolen = Math.min(1000, p1.money);
                p1.money -= stolen;
                p2.money += stolen;
            }
        }

        // تحديث أرقام الشاشة وحالة الأزرار
        function updateUI() {
            document.getElementById('p1-money').innerText = `$${p1.money}`;
            document.getElementById('p1-mps').innerText = `+$${p1.mps}`;
            document.getElementById('p2-money').innerText = `$${p2.money}`;
            document.getElementById('p2-mps').innerText = `+$${p2.mps}`;

            // تفعيل/تعطيل الأزرار حسب الفلوس المتاحة لللاعب
            document.getElementById('p1-up1').disabled = p1.money < prices.teller || p1.isFrozen;
            document.getElementById('p1-up2').disabled = p1.money < prices.atm || p1.isFrozen;
            document.getElementById('p1-atk1').disabled = p1.money < prices.drainCost || p1.isFrozen;
            document.getElementById('p1-atk2').disabled = p1.money < prices.freezeCost || p1.isFrozen;
        }

        // نهاية اللعبة وتحديد الفائز
        function endGame() {
            gameActive = false;
            clearInterval(gameLoop);
            
            let resultMessage = "";
            if (p1.money > p2.money) {
                resultMessage = `🏆 مبروك يا أحمد! كسبت بمجموع ثروة: $${p1.money} مقابل $${p2.money} للمنافس!`;
            } else if (p2.money > p1.money) {
                resultMessage = `😢 حظ أوفر! الكمبيوتر كسبك بمجموع ثروة: $${p2.money} مقابل $${p1.money} ليك.`;
            } else {
                resultMessage = `🤝 تعادل صاعق! كلاكما جمع نفس المبلغ بالضبط!`;
            }

            alert(resultMessage);
            location.reload(); // إعادة تشغيل اللعبة
        }
    </script>
</body>
</html>
