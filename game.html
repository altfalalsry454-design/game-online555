<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحرامي والبنك أونلاين 💰</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .screen { display: none; } 
        .active-screen { display: block; }
        
        /* تصميم شاشة اللوبي والدخول */
        .lobby-card { background: #161b22; max-width: 400px; margin: 8px auto; padding: 30px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h1 { color: #da3637; margin-bottom: 25px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; width: 85%; text-align: center; font-size: 16px; margin-bottom: 15px; }
        
        /* تصميم أزرار اللعبة */
        .btn { padding: 15px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; width: 100%; max-width: 280px; font-size: 16px; transition: 0.2s; }
        .btn-green { background: #238636; color: white; }
        .btn-green:hover { background: #2ea043; }
        .btn-red { background: #da3637; color: white; width: 100%; max-width: 500px; }
        
        /* الجريد والتوزيع للمحتوى المشابه لصورتك */
        .main-wrapper { max-width: 1000px; margin: 0 auto; }
        .game-header { color: #da3637; font-size: 28px; margin-bottom: 10px; font-weight: bold; }
        .room-code-tag { color: #f1c40f; font-size: 22px; margin-bottom: 25px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; } }
        
        .box-panel { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; min-height: 300px; position: relative; }
        .box-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        
        /* قائمة اللاعبين والشات */
        .player-row { background: #21262d; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .badge-host { background: #f1c40f; color: black; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .chat-messages { height: 180px; overflow-y: auto; text-align: right; background: #0d1117; padding: 10px; border-radius: 6px; border: 1px solid #30363d; margin-bottom: 10px; }
        .chat-input-row { display: flex; gap: 10px; }
        .chat-input-row input { margin: 0; width: 75%; }
        .chat-input-row button { width: 25%; padding: 10px; background: #1f6feb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .start-action-btn { background: #238636; color: white; font-size: 18px; padding: 15px; width: 90%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
        .start-action-btn:hover { background: #2ea043; }
        
        /* شاشة عرض الدور السري */
        .role-display { font-size: 60px; color: #f1c40f; margin-top: 40px; text-shadow: 0 0 15px rgba(241,196,15,0.6); }
    </style>
</head>
<body>

    <div id="lobbyScreen" class="screen active-screen">
        <div class="lobby-card">
            <h1>لعبة الحرامي والبنك</h1>
            <input type="text" id="playerName" placeholder="👤 اكتب اسمك هنا..." required><br>
            <input type="text" id="roomName" placeholder="🔑 اكتب كود أو اسم الغرفة..."><br>
            <button class="btn btn-green" onclick="joinOrCreateRoom()">دخول الغرفة الآن</button>
        </div>
    </div>
    
    <div id="gameRoom" class="screen main-wrapper">
        <div class="game-header">الحرامي والبنك أونلاين 💰</div>
        <div class="room-code-tag">كود الدخول السريع: #<span id="roomTitle"></span></div>
        
        <div class="grid-container">
            <div class="box-panel">
                <div class="box-title">💬 شات بوكس الروم (مباشر)</div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="اكتب رسالتك هنا...">
                    <button onclick="sendChatMessage()">إرسال</button>
                </div>
            </div>
            
            <div class="box-panel">
                <div class="box-title">👤 قائمة اللاعبين في الروم</div>
                <div id="playerList"></div>
                
                <button id="startBtn" class="start-action-btn" style="display:none;" onclick="startGame()">🚀 ابدأ اللعبة الآن</button>
            </div>
        </div>
        
        <button class="btn btn-red" onclick="leaveRoom()">🚪 مغادرة الغرفة والعودة للوبي</button>
    </div>

    <div id="gamePlay" class="screen main-wrapper">
        <div class="game-header" style="margin-top: 50px;">تم توزيع الأدوار بنجاح!</div>
        <h2>دورك السري في هذه الجولة هو:</h2>
        <div id="myRole" class="role-display"></div>
        <br><br><br>
        <div id="adminResetOnly" style="display:none;">
            <button class="btn btn-red" onclick="resetGame()">🔄 جولة جديدة (إعادة تعيين للكل)</button>
        </div>
    </div>

    <script>
        // --- إعدادات اتصال الفايربيز الخاصة بك ---
        const firebaseConfig = {
            databaseURL: "https://zerobaba-7733e-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRoom = "";
        let myName = "";

        // دالة الدخول أو الإنضمام للروم
        function joinOrCreateRoom() {
            myName = document.getElementById('playerName').value.trim();
            currentRoom = document.getElementById('roomName').value.trim();

            if (!myName || !currentRoom) {
                alert("يا بطل اكتب اسمك واسم الروم أولاً عشان تدخل!");
                return;
            }

            db.ref('rooms/' + currentRoom).once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    // أول لاعب يدخل الروم بيتم تعيينه كـ Host (المالك / الأدمن)
                    db.ref('rooms/' + currentRoom).set({
                        host: myName,
                        status: "waiting"
                    });
                }
                
                // إضافة اللاعب بقائمة اللاعبين
                db.ref('rooms/' + currentRoom + '/players/' + myName).set({
                    name: myName,
                    role: "لم يحدد بعد"
                });

                switchScreen('gameRoom');
                document.getElementById('roomTitle').innerText = currentRoom;
                listenToRoom();
                listenToChat();
            });
        }

        // رادار مراقبة الغرفة واللاعبين وتغيير الشاشات
        function listenToRoom() {
            db.ref('rooms/' + currentRoom).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // إظهار زرار البدء للمالك (الأدمن) فقط وإخفائه عن الباقي
                if (data.host === myName) {
                    document.getElementById('startBtn').style.display = "block";
                    document.getElementById('adminResetOnly').style.display = "block";
                } else {
                    document.getElementById('startBtn').style.display = "none";
                    document.getElementById('adminResetOnly').style.display = "none";
                }

                // تحديث قائمة اللاعبين المباشرة بنفس ستايل المالك
                const playerListDiv = document.getElementById('playerList');
                playerListDiv.innerHTML = "";
                if (data.players) {
                    Object.keys(data.players).forEach((pName) => {
                        let isHostBadge = (pName === data.host) ? `<span class="badge-host">👑 المالك</span>` : `<span></span>`;
                        playerListDiv.innerHTML += `
                            <div class="player-row">
                                ${isHostBadge}
                                <span>${pName} 👤</span>
                            </div>`;
                    });
                }

                // التحويل التلقائي لشاشة اللعب عند بدء اللعبة
                if (data.status === "playing") {
                    switchScreen('gamePlay');
                    if (data.players && data.players[myName]) {
                        document.getElementById('myRole').innerText = data.players[myName].role;
                    }
                } else if (data.status === "waiting") {
                    switchScreen('gameRoom');
                }
            });
        }

        // دالة بدء اللعبة وتوزيع الأدوار (تُستدعى فوراً عند ضغط الأدمن على الزر الأخضر)
        function startGame() {
            db.ref('rooms/' + currentRoom + '/players').once('value', (snapshot) => {
                const players = snapshot.val();
                if (!players) return;

                const playerNames = Object.keys(players);
                
                // الأدوار الأساسية للعبة
                let roles = ["حرامي", "بنك", "عسكري"];
                
                // خلط عشوائي للأدوار
                playerNames.sort(() => Math.random() - 0.5);

                // توزيع الأدوار لكل اسم في السيرفر
                playerNames.forEach((name, index) => {
                    let finalRole = roles[index] || "مواطن صالح"; // إذا زاد العدد عن 3
                    db.ref(`rooms/${currentRoom}/players/${name}`).update({
                        role: finalRole
                    });
                });

                // تفعيل حالة البدء ليدخل الجميع شاشة اللعب فوراً
                db.ref('rooms/' + currentRoom).update({
                    status: "playing"
                });
            });
        }

        // دالة إرسال الشات
        function sendChatMessage() {
            const msgInput = document.getElementById('chatInput');
            const msgText = msgInput.value.trim();
            if(!msgText) return;

            db.ref('rooms/' + currentRoom + '/chat').push({
                sender: myName,
                text: msgText
            });
            msgInput.value = "";
        }

        // رادار مراقبة رسائل الشات وعرضها فوراً
        function listenToChat() {
            db.ref('rooms/' + currentRoom + '/chat').on('value', (snapshot) => {
                const chatDiv = document.getElementById('chatMessages');
                chatDiv.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.values(data).forEach(msg => {
                        chatDiv.innerHTML += `<div><strong>${msg.sender}:</strong> ${msg.text}</div>`;
                    });
                    chatDiv.scrollTop = chatDiv.scrollHeight; // سكرول لآخر رسالة تلقائياً
                }
            });
        }

        // إعادة تعيين الجولة والعودة للانتظار
        function resetGame() {
            db.ref('rooms/' + currentRoom).update({
                status: "waiting"
            }).then(() => {
                db.ref('rooms/' + currentRoom + '/players').once('value', (snapshot) => {
                    const players = snapshot.val();
                    if(players) {
                        Object.keys(players).forEach((name) => {
                            db.ref(`rooms/${currentRoom}/players/${name}`).update({ role: "لم يحدد بعد" });
                        });
                    }
                });
            });
        }

        // دالة مغادرة الروم
        function leaveRoom() {
            if(currentRoom && myName) {
                db.ref(`rooms/${currentRoom}/players/${myName}`).remove().then(() => {
                    location.reload();
                });
            }
        }

        // التنقل بين الشاشات
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }
    </script>
</body>
</html>
