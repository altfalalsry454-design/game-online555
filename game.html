<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة اللعبة - الحرامي والبنك</title>
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; padding-top: 70px; }
        
        /* الهيدر العلوي */
        header { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; background-color: #161b22; border-bottom: 2px solid #30363d; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #ff4757; }
        .user-tag { font-size: 15px; color: #58a6ff; }

        /* حاوية الصفحة الرئيسية */
        .main-wrapper { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: block; }
        
        /* الشاشات */
        .screen { display: none; }
        .active-screen { display: block; }

        /* كروت وخانات اللوبي (الرئيسية) */
        .lobby-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 25px; margin-bottom: 20px; text-align: right; }
        .lobby-card h2 { margin-top: 0; color: #f5f5f5; font-size: 18px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        
        /* المدخلات والأزرار */
        .input-field { width: 100%; padding: 12px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #fff; font-size: 15px; margin-top: 10px; margin-bottom: 10px; text-align: right; }
        .input-field:focus { border-color: #58a6ff; outline: none; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-green { background-color: #238636; color: white; }
        .btn-green:hover { background-color: #2ea043; }
        .btn-blue { background-color: #1f6feb; color: white; }
        .btn-blue:hover { background-color: #388bfd; }
        .btn-red { background-color: #da3637; color: white; }
        .btn-red:hover { background-color: #f85149; }

        /* قائمة الرومات المشتركة */
        .rooms-grid { background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .room-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #21262d; }
        .room-row:last-child { border-bottom: none; }
        .join-mini-btn { background-color: #238636; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* تقسيم شاشة الروم (اللاعبين والشات جنب بعض) */
        .room-layout { display: table; width: 100%; table-layout: fixed; border-spacing: 15px 0; }
        .room-column { display: table-cell; vertical-align: top; background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        
        /* قائمة اللاعبين */
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 10px; }
        .host-badge { color: #f1c40f; font-weight: bold; font-size: 13px; }
        .action-mini-btn { padding: 4px 8px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; font-weight: bold; }

        /* الشات بوكس */
        .chat-area { display: flex; flex-direction: column; height: 300px; }
        .chat-messages { flex-grow: 1; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; overflow-y: auto; font-size: 14px; text-align: right; }
        .chat-msg-item { margin-bottom: 8px; line-height: 1.4; }
        .chat-msg-user { color: #58a6ff; font-weight: bold; }
        .chat-input-group { display: table; width: 100%; margin-top: 10px; }
        .chat-input-cell { display: table-cell; width: 80%; }
        .chat-btn-cell { display: table-cell; width: 20%; padding-right: 8px; }

        /* التنبيهات */
        #alertBox { padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-weight: bold; text-align: center; }
        .alert-success { background-color: rgba(35, 134, 54, 0.2); color: #238636; border: 1px solid #238636; }
        .alert-error { background-color: rgba(218, 54, 55, 0.2); color: #da3637; border: 1px solid #da3637; }
    </style>
</head>
<body>

    <header>
        <div class="logo">الحرامي والبنك أونلاين 💰</div>
        <div class="user-tag">👤 اسمك: <span id="myUsernameDisplay">-</span></div>
    </header>

    <div class="main-wrapper">
        <div id="alertBox"></div>

        <div id="lobbyScreen" class="screen active-screen">
            
            <div class="lobby-card">
                <h2>➕ إنشاء روم جديدة</h2>
                <input type="text" id="newRoomName" class="input-field" placeholder="اكتب اسم الروم هنا...">
                <button class="btn btn-green" onclick="createRoomAction()">اضغط هنا لإنشاء الروم وتصبح المالك</button>
            </div>

            <div class="lobby-card">
                <h2>🚪 رومات اللعبة النشطة أونلاين</h2>
                <div class="rooms-grid" id="roomsContainer">
                    <p style="text-align: center; color: #8b949e; padding: 20px;">جاري تحميل الرومات النشطة...</p>
                </div>
                <button class="btn btn-blue" style="margin-top: 10px; padding: 8px;" onclick="refreshRoomsList()">🔄 تحديث قائمة الرومات المتاحة</button>
            </div>

            <div class="lobby-card">
                <h2>🔑 انضمام إلى الروم (عن طريق الكود)</h2>
                <input type="text" id="searchRoomCode" class="input-field" placeholder="أدخل كود الروم المكون من 4 أرقام...">
                <button class="btn btn-blue" onclick="joinRoomByCodeAction()">انضمام إلى الروم مباشرة</button>
            </div>

        </div>

        <div id="roomScreen" class="screen">
            <div class="lobby-card" style="text-align: center; margin-bottom: 15px;">
                <h1 id="roomTitle" style="margin: 0 0 10px 0; font-size: 22px; color: #fff;">اسم الروم الحالي</h1>
                <div style="font-size: 16px; color: #8b949e;">
                    كود الدخول السريع: <span id="roomCode" style="color: #f1c40f; font-weight: bold; font-size: 20px;">#0000</span>
                </div>
            </div>

            <div class="room-layout">
                
                <div class="room-column">
                    <h3 style="margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 8px;">👤 قائمة اللاعبين في الروم</h3>
                    <div id="playersContainer" style="min-height: 200px;"></div>
                    
                    <div id="ownerControls" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #30363d;">
                        <button class="btn btn-green" onclick="startGameAction()">🚀 ابدأ اللعبة الآن</button>
                    </div>
                </div>

                <div class="room-column">
                    <h3 style="margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 8px;">💬 شات بوكس الروم (مباشر)</h3>
                    <div class="chat-area">
                        <div class="chat-messages" id="chatMessagesContainer"></div>
                        <div class="chat-input-group">
                            <div class="chat-input-cell">
                                <input type="text" id="chatMessageInput" class="input-field" style="margin:0;" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                            </div>
                            <div class="chat-btn-cell">
                                <button class="btn btn-blue" style="padding: 11px;" onclick="sendChatMessage()">إرسال</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <button class="btn btn-red" style="margin-top: 20px;" onclick="leaveRoomAction()">🚪 مغادرة الغرفة والعودة للوبي</button>
        </div>

    </div>

    <script type="module">

        import { getDatabase, ref, push, set, once, onValue, off, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // تهيئة فايربيز وقاعدة البيانات
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب اسم المستخدم من صفحة تسجيل الدخول
        const urlParams = new URLSearchParams(window.location.search);
        const myUsername = urlParams.get('user') || "لاعب_" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('myUsernameDisplay').innerText = myUsername;

        let currentRoomId = null;
        let isIAmOwner = false;

        function triggerAlert(msg, isError = false) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = msg;
            alertBox.className = isError ? "alert-error" : "alert-success";
            alertBox.style.display = "block";
            setTimeout(() => { alertBox.style.display = "none"; }, 3500);
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        // ربط الدوال بـ window لتتمكن أزرار الـ
