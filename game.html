<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة اللعبة - الحرامي والبنك</title>
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; padding-top: 70px; }
        
        /* الهيدر العلوي */
        header { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; background-color: #161b22; border-bottom: 2px solid #30363d; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #ff4757; }
        .user-tag { font-size: 15px; color: #58a6ff; }

        /* حاوية الصفحة الرئيسية */
        .main-wrapper { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: block; }
        
        /* الشاشات */
        .screen { display: none; }
        .active-screen { display: block; }

        /* كروت وخانات اللوبي (الرئيسية) */
        .lobby-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 25px; margin-bottom: 20px; text-align: right; }
        .lobby-card h2 { margin-top: 0; color: #f5f5f5; font-size: 18px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        
        /* المدخلات والأزرار */
        .input-field { width: 100%; padding: 12px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #fff; font-size: 15px; margin-top: 10px; margin-bottom: 10px; text-align: right; }
        .input-field:focus { border-color: #58a6ff; outline: none; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-green { background-color: #238636; color: white; }
        .btn-green:hover { background-color: #2ea043; }
        .btn-blue { background-color: #1f6feb; color: white; }
        .btn-blue:hover { background-color: #388bfd; }
        .btn-red { background-color: #da3637; color: white; }
        .btn-red:hover { background-color: #f85149; }

        /* قائمة الرومات المشتركة */
        .rooms-grid { background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .room-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #21262d; }
        .room-row:last-child { border-bottom: none; }
        .join-mini-btn { background-color: #238636; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* تقسيم شاشة الروم */
        .room-layout { display: table; width: 100%; table-layout: fixed; border-spacing: 15px 0; }
        .room-column { display: table-cell; vertical-align: top; background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        
        /* قائمة اللاعبين */
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 10px; }
        .host-badge { color: #f1c40f; font-weight: bold; font-size: 13px; }
        .action-mini-btn { padding: 4px 8px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; font-weight: bold; }

        /* الشات بوكس */
        .chat-area { display: flex; flex-direction: column; height: 300px; }
        .chat-messages { flex-grow: 1; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; overflow-y: auto; font-size: 14px; text-align: right; }
        .chat-msg-item { margin-bottom: 8px; line-height: 1.4; }
        .chat-msg-user { color: #58a6ff; font-weight: bold; }
        .chat-input-group { display: table; width: 100%; margin-top: 10px; }
        .chat-input-cell { display: table-cell; width: 80%; }
        .chat-btn-cell { display: table-cell; width: 20%; padding-right: 8px; }

        /* التنبيهات */
        #alertBox { padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-weight: bold; text-align: center; }
        .alert-success { background-color: rgba(35, 134, 54, 0.2); color: #238636; border: 1px solid #238636; }
        .alert-error { background-color: rgba(218, 54, 55, 0.2); color: #da3637; border: 1px solid #da3637; }
    </style>
</head>
<body>

    <header>
        <div class="logo">الحرامي والبنك أونلاين 💰</div>
        <div class="user-tag">👤 اسمك: <span id="myUsernameDisplay">-</span></div>
    </header>

    <div class="main-wrapper">
        <div id="alertBox"></div>

        <div id="lobbyScreen" class="screen active-screen">
            
            <div class="lobby-card">
                <h2>➕ إنشاء روم جديدة</h2>
                <input type="text" id="newRoomName" class="input-field" placeholder="اكتب اسم الروم هنا...">
                <button class="btn btn-green" onclick="createRoomAction()">اضغط هنا لإنشاء الروم وتصبح المالك</button>
            </div>

            <div class="lobby-card">
                <h2>🚪 رومات اللعبة النشطة أونلاين</h2>
                <div class="rooms-grid" id="roomsContainer">
                    <p style="text-align: center; color: #8b949e; padding: 20px;">جاري تحميل الرومات النشطة...</p>
                </div>
                <button class="btn btn-blue" style="margin-top: 10px; padding: 8px;" onclick="refreshRoomsList()">🔄 تحديث قائمة الرومات المتاحة</button>
            </div>

            <div class="lobby-card">
                <h2>🔑 انضمام إلى الروم (عن طريق الكود)</h2>
                <input type="text" id="searchRoomCode" class="input-field" placeholder="أدخل كود الروم المكون من 4 أرقام...">
                <button class="btn btn-blue" onclick="joinRoomByCodeAction()">انضمام إلى الروم مباشرة</button>
            </div>

        </div>

        <div id="roomScreen" class="screen">
            <div class="lobby-card" style="text-align: center; margin-bottom: 15px;">
                <h1 id="roomTitle" style="margin: 0 0 10px 0; font-size: 22px; color: #fff;">اسم الروم الحالي</h1>
                <div style="font-size: 16px; color: #8b949e;">
                    كود الدخول السريع: <span id="roomCode" style="color: #f1c40f; font-weight: bold; font-size: 20px;">#0000</span>
                </div>
            </div>

            <div class="room-layout">
                
                <div class="room-column">
                    <h3 style="margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 8px;">👤 قائمة اللاعبين في الروم</h3>
                    <div id="playersContainer" style="min-height: 200px;"></div>
                    
                    <div id="ownerControls" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #30363d;">
                        <button class="btn btn-green" onclick="startGameAction()">🚀 ابدأ اللعبة الآن</button>
                    </div>
                </div>

                <div class="room-column">
                    <h3 style="margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 8px;">💬 شات بوكس الروم (مباشر)</h3>
                    <div class="chat-area">
                        <div class="chat-messages" id="chatMessagesContainer"></div>
                        <div class="chat-input-group">
                            <div class="chat-input-cell">
                                <input type="text" id="chatMessageInput" class="input-field" style="margin:0;" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                            </div>
                            <div class="chat-btn-cell">
                                <button class="btn btn-blue" style="padding: 11px;" onclick="sendChatMessage()">إرسال</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <button class="btn btn-red" style="margin-top: 20px;" onclick="leaveRoomAction()">🚪 مغادرة الغرفة والعودة للوبي</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, once, onValue, off, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCYnbAcV0HtrSyRUorBQmXQuBJO7m1C4A",
            authDomain: "zerobaba-7733e.firebaseapp.com",
            databaseURL: "https://zerobaba-7733e-default-rtdb.firebaseio.com/",
            projectId: "zerobaba-7733e",
            storageBucket: "zerobaba-7733e.firebasestorage.app",
            messagingSenderId: "20311065718",
            appId: "1:20311065718:web:5e50f0ad492d57f2518b57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const myUsername = urlParams.get('user') || "لاعب_" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('myUsernameDisplay').innerText = myUsername;

        let currentRoomId = null;
        let isIAmOwner = false;

        function triggerAlert(msg, isError = false) {
            const alertBox = document.getElementById('alertBox');
            if(alertBox) {
                alertBox.innerText = msg;
                alertBox.className = isError ? "alert-error" : "alert-success";
                alertBox.style.display = "block";
                setTimeout(() => { alertBox.style.display = "none"; }, 3500);
            }
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        window.createRoomAction = function() {
            const roomName = document.getElementById('newRoomName').value.trim();
            if (!roomName) { triggerAlert("من فضلك أدخل اسم الروم أولاً!", true); return; }

            const roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            const roomsRef = ref(db, 'rooms');
            const newRoomRef = push(roomsRef);
            const roomId = newRoomRef.key;

            const roomData = {
                name: roomName,
                code: roomCode,
                owner: myUsername,
                status: "waiting"
            };

            set(newRoomRef, roomData).then(() => {
                const playerRef = push(ref(db, `rooms/${roomId}/players`));
                set(playerRef, {
                    name: myUsername,
                    role: "Owner"
                }).then(() => {
                    enterRoomLocalSetup(roomName, roomCode, true, roomId);
                });
            }).catch(err => triggerAlert("خطأ أثناء إنشاء الروم: " + err.message, true));
        };

        window.joinRoomByCodeAction = function() {
            const codeInput = document.getElementById('searchRoomCode').value.trim();
            if (!codeInput) { triggerAlert("من فضلك أدخل كود الروم المكون من 4 أرقام!", true); return; }

            once(ref(db, 'rooms')).then((snapshot) => {
                const rooms = snapshot.val();
                let foundRoomId = null;
                let foundRoomData = null;

                if (rooms) {
                    for (let id in rooms) {
                        if (rooms[id].code === codeInput) {
                            foundRoomId = id;
                            foundRoomData = rooms[id];
                            break;
                        }
                    }
                }

                if (foundRoomId) {
                    const currentPlayersCount = foundRoomData.players ? Object.keys(foundRoomData.players).length : 0;
                    if (currentPlayersCount >= 8) { triggerAlert("هذا الروم ممتلئ بالفعل!", true); return; }

                    const playerRef = push(ref(db, `rooms/${foundRoomId}/players`));
                    set(playerRef, {
                        name: myUsername,
                        role: "Player"
                    }).then(() => {
                        enterRoomLocalSetup(foundRoomData.name, foundRoomData.code, false, foundRoomId);
                    });
                } else {
                    triggerAlert("لم يتم العثور على روم بهذا الكود! تأكد من الرقم.", true);
                }
            });
        };

        function enterRoomLocalSetup(name, code, isOwner, roomId) {
            currentRoomId = roomId;
            isIAmOwner = isOwner;

            document.getElementById('roomTitle').innerText = name;
            document.getElementById('roomCode').innerText = "#" + code;
            document.getElementById('ownerControls').style.display = isOwner ? "block" : "none";

            switchScreen('roomScreen');
            document.getElementById('newRoomName').value = "";
            document.getElementById('searchRoomCode').value = "";

            onValue(ref(db, `rooms/${roomId}/players`), (snapshot) => {
                const players = snapshot.val();
                const container = document.getElementById('playersContainer');
                container.innerHTML = "";

                let amIKicked = true;

                if (players) {
                    for (let pId in players) {
                        const p = players[pId];
                        if (p.name === myUsername) amIKicked = false;

                        let badgeAndButtons = "";
                        if (p.role === "Owner") {
                            badgeAndButtons = '<span class="host-badge">👑 المالك</span>';
                        } else if (isIAmOwner) {
                            badgeAndButtons = `
                                <div>
                                    <button class="action-mini-btn" style="background-color:#1f6feb; color:white;" onclick="window.transferOwnerOnline('${pId}', '${p.name}')">نقل الملكية</button>
                                    <button class="action-mini-btn" style="background-color:#da3637; color:white;" onclick="window.kickPlayerOnline('${pId}')">طرد</button>
                                </div>
                            `;
                        }

                        container.innerHTML += `
                            <div class="player-row">
                                <span>👤 ${p.name}</span>
                                ${badgeAndButtons}
                            </div>
                        `;
                    }
                }

                if (amIKicked && !isIAmOwner) {
                    exitRoomUIReset();
                    triggerAlert("لقد تم طردك من هذا الروم بواسطة المالك!", true);
                }
            });

            onValue(ref(db, `rooms/${roomId}/chat`), (snapshot) => {
                const chats = snapshot.val();
                const chatContainer = document.getElementById('chatMessagesContainer');
                chatContainer.innerHTML = "";

                if (chats) {
                    for (let cId in chats) {
                        const msg = chats[cId];
                        chatContainer.innerHTML += `
                            <div class="chat-msg-item">
                                <span class="chat-msg-user">${msg.user}:</span> 
                                <span>${msg.text}</span>
                            </div>
                        `;
                    }
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            });
        }

        window.sendChatMessage = function() {
            const input = document.getElementById('chatMessageInput');
            const txt = input.value.trim();
            if (!txt || !currentRoomId) return;

            const chatRef = push(ref(db, `rooms/${currentRoomId}/chat`));
            set(chatRef, {
                user: myUsername,
                text: txt
            });
            input.value = "";
        };

        window.kickPlayerOnline = function(playerKey) {
            if (confirm("هل أنت متأكد من طرد هذا اللاعب؟")) {
                remove(ref(db, `rooms/${currentRoomId}/players/${playerKey}`))
                    .then(() => triggerAlert("تم طرد اللاعب بنجاح."));
            }
        };

        window.transferOwnerOnline = function(playerKey, playerName) {
            if (confirm(`هل تريد نقل ملكية الروم بالكامل إلى ${playerName}؟`)) {
                set(ref(db, `rooms/${currentRoomId}/players/${playerKey}/role`), "Owner").then(() => {
                    once(ref(db, `rooms/${currentRoomId}/players`)).then((snapshot) => {
                        const players = snapshot.val();
                        if (players) {
                            for (let id in players) {
                                if (players[id].name === myUsername) {
                                    set(ref(db, `rooms/${currentRoomId}/players/${id}/role`), "Player");
                                    break;
                                }
                            }
                        }
                        isIAmOwner = false;
                        set(ref(db, `rooms/${currentRoomId}/owner`), playerName);
                        document.getElementById('ownerControls').style.display = "none";
                        triggerAlert("تم نقل ملكية الروم، تحولت الآن إلى لاعب عادي!");
                        enterRoomLocalSetup(document.getElementById('roomTitle').innerText, document.getElementById('roomCode').innerText.replace('#',''), false, currentRoomId);
                    });
                });
            }
        };

        window.refreshRoomsList = function() {
            once(ref(db, 'rooms')).then((snapshot) => {
                const rooms = snapshot.val();
                const container = document.getElementById('roomsContainer');
                container.innerHTML = "";

                if (!rooms) {
                    container.innerHTML = '<p style="text-align: center; color: #8b949e; padding: 20px;">لا توجد غرف مفتوحة حالياً.</p>';
                    return;
                }

                for (let id in rooms) {
                    const r = rooms[id];
                    const count = r.players ? Object.keys(r.players).length : 0;
                    
                    container.innerHTML += `
                        <div class="room-row">
                            <div>
                                <strong style="color:#fff;">${r.name}</strong> 
                                <span style="color:#8b949e; font-size:13px; margin-right:10px;">(الكود: #${r.code})</span>
                                <br><small style="color:#58a6ff;">اللاعبين داخل الروم: ${count}/8</small>
                            </div>
                            <button class="join-mini-btn" onclick="window.directJoinFromList('${id}', '${r.name}', '${r.code}')">انضمام سريع</button>
                        </div>
                    `;
                }
            });
        };

        window.directJoinFromList = function(roomId, rName, rCode) {
            const playerRef = push(ref(db, `rooms/${roomId}/players`));
            set(playerRef, {
                name: myUsername,
                role: "Player"
            }).then(() => {
                enterRoomLocalSetup(rName, rCode, false, roomId);
            });
        };

        window.leaveRoomAction = function() {
            if (currentRoomId) {
                off(ref(db, `rooms/${currentRoomId}/players`));
                off(ref(db, `rooms/${currentRoomId}/chat`));

                once(ref(db, `rooms/${currentRoomId}/players`)).then((snapshot) => {
                    const players = snapshot.val();
                    if (players) {
                        for (let id in players) {
                            if (players[id].name === myUsername) {
                                remove(ref(db, `rooms/${currentRoomId}/players/${id}`));
                                break;
                            }
                        }
                    }
                    exitRoomUIReset();
                });
            } else {
                exitRoomUIReset();
            }
        };

        function exitRoomUIReset() {
            currentRoomId = null;
            isIAmOwner = false;
            switchScreen('lobbyScreen');
            window.refreshRoomsList();
        }

        window.startGameAction = function() {
            triggerAlert("🔥 انطلقت الجولة الأولى أونلاين وجاري تحديد الأدوار!");
        };

        // تشغيل جلب الرومات عند التحميل الأول تلقائياً
        setTimeout(() => { window.refreshRoomsList(); }, 500);
    </script>
</body>
</html>
