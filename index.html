<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - الحرامي والبنك</title>
    
    <style>
        body { margin: 0; padding: 0; background-color: #0d1117; color: #ffffff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-container { background-color: #161b22; padding: 40px; border-radius: 10px; border: 1px solid #30363d; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .input-group { text-align: right; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #8b949e; }
        .input-group input { width: 100%; padding: 12px; box-sizing: border-box; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; font-size: 16px; }
        .btn-submit { width: 100%; padding: 12px; background-color: #238636; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-submit:hover { background-color: #2ea043; }
        .toggle-auth { margin-top: 20px; font-size: 14px; color: #8b949e; }
        .toggle-auth a { color: #58a6ff; text-decoration: none; margin-right: 5px; cursor: pointer; }
        #alertBox { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-weight: bold; text-align: center; font-size: 14px; }
        .err { background-color: #ff475752; color: #ff4757; border: 1px solid #ff4757; }
        .succ { background-color: #23863652; color: #238636; border: 1px solid #238636; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 id="mainTitle">الحرامي والبنك</h1>
        <form id="authForm">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" required placeholder="مثال: Ahmad">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required placeholder="أدخل كلمة المرور">
            </div>
            <button type="submit" class="btn-submit" id="btnSubmit">تسجيل الدخول</button>
        </form>

        <div id="alertBox"></div>

        <div class="toggle-auth">
            <span id="toggleText">ليس لديك حساب؟</span>
            <a id="toggleLink" onclick="toggleAuthMode()">إنشاء حساب جديد</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCYnbAcV0HtrSyRUorBQmXQuBJO7m1C4A",
            authDomain: "zerobaba-7733e.firebaseapp.com",
            projectId: "zerobaba-7733e",
            storageBucket: "zerobaba-7733e.firebasestorage.app",
            messagingSenderId: "20311065718",
            appId: "1:20311065718:web:5e50f0ad492d57f2518b57"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let isSignUpMode = false;

        function showAlert(txt, type) {
            const box = document.getElementById('alertBox');
            box.innerText = txt;
            box.className = type;
            box.style.display = 'block';
        }

        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('mainTitle').innerText = isSignUpMode ? "إنشاء حساب جديد" : "الحرامي والبنك";
            document.getElementById('btnSubmit').innerText = isSignUpMode ? "سجل الآن" : "تسجيل الدخول";
            document.getElementById('toggleText').innerText = isSignUpMode ? "لديك حساب بالفعل؟" : "ليس لديك حساب؟";
            document.getElementById('toggleLink').innerText = isSignUpMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
            document.getElementById('alertBox').style.display = 'none'; // إخفاء الرسالة عند التبديل
        }

        document.getElementById('authForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if (user === "Zero" && pass === "159357") {
                showAlert("أهلاً بك يا أدمن Zero! جاري فتح لوحة التحكم...", "succ");
                setTimeout(() => { window.location.href = "admin.html"; }, 1000);
                return;
            }

            try {
                // تحويل اسم المستخدم لإيميل وهمي عشان الفايربيز يقبله بدون مشاكل
                const email = user.toLowerCase().replace(/\s+/g, '') + "@game.com";
                
                if (isSignUpMode) {
                    let res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + res.user.uid), { username: user, points: 0 });
                    showAlert("تم إنشاء الحساب بنجاح! جاري تحويلك للعبة...", "succ");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                    showAlert("تم تسجيل الدخول بنجاح! جاري تحويلك للعبة...", "succ");
                }
                setTimeout(() => { window.location.href = "game.html?user=" + encodeURIComponent(user); }, 1500);
            } catch (err) {
                let errorMessage = "حدث خطأ غير متوقع، حاول مرة أخرى.";

                // فحص نوع الخطأ من فايربيز وترجمته لرسالة عربية واضحة
                switch (err.code) {
                    case "auth/weak-password":
                        errorMessage = "عفواً! يجب أن تكون كلمة المرور مكونة من 6 أرقام أو أحرف على الأقل.";
                        break;
                    case "auth/invalid-email":
                        errorMessage = "اسم المستخدم غير صالح أو يحتوي على رموز ممنوعة.";
                        break;
                    case "auth/email-already-in-use":
                        errorMessage = "اسم المستخدم هذا مسجل بالفعل! جرب اسماً آخر أو سجل دخولك.";
                        break;
                    case "auth/wrong-password":
                    case "auth/invalid-credential":
                        errorMessage = "خطأ في اسم المستخدم أو كلمة المرور، تأكد من البيانات.";
                        break;
                    case "auth/user-not-found":
                        errorMessage = "هذا الحساب غير موجود، يرجى إنشاء حساب جديد أولاً.";
                        break;
                }

                showAlert(errorMessage, "err");
            }
        });
    </script>
</body>
</html>
