<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - الحرامي والبنك</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background-color: #0d1117; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #161b22; padding: 30px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #30363d; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #238636; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #2ea043; }
        .link { cursor: pointer; color: #58a6ff; font-size: 14px; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div class="box">
        <h2 id="title">تسجيل الدخول</h2>
        <form id="authForm">
            <input type="text" id="username" placeholder="اسم المستخدم" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit" id="btnAction">دخول</button>
        </form>
        <span class="link" onclick="toggleMode()" id="toggleBtn">ليس لديك حساب؟ إنشاء حساب جديد</span>
    </div>

    <script>
   const firebaseConfig = {
         apiKey: "AIzaSyDzH9haIp8fLivWBGIGTMZShiL5YV-3fKQ",
          authDomain: "zero-feea1.firebaseapp.com",
          projectId: "zero-feea1",
         storageBucket: "zero-feea1.firebasestorage.app",
         messagingSenderId: "51578202386",
        appId: "1:51578202386:web:d75b98548d27ea8342abcb",
        measurementId: "G-7Y4N19BK10"
    };
        firebase.initializeApp(firebaseConfig);

        let isLogin = true;
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "تسجيل الدخول" : "إنشاء حساب جديد";
            document.getElementById('btnAction').innerText = isLogin ? "دخول" : "تسجيل";
            document.getElementById('toggleBtn').innerText = isLogin ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب بالفعل؟ سجل دخول";
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            // كود الأدمن
            if (user === "Zero" && pass === "159357") {
                window.location.href = "admin.html";
                return;
            }

            // تحويل الاسم لإيميل وهمي للتعامل مع Firebase
            const email = user.toLowerCase().replace(/\s+/g, '') + "@game.com";

            try {
                if (isLogin) {
                    await firebase.auth().signInWithEmailAndPassword(email, pass);
                } else {
                    await firebase.auth().createUserWithEmailAndPassword(email, pass);
                    await firebase.database().ref('users/' + firebase.auth().currentUser.uid).set({ username: user });
                }
                window.location.href = "game.html?user=" + encodeURIComponent(user);
            } catch (err) {
                alert("خطأ: " + err.message);
            }
        });
    </script>
</body>
</html>
