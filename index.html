<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزاد الملوك - ZeroBaba</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // إعدادات مشروعك المدمجة
        const firebaseConfig = {
            apiKey: "AIzaSyDCYnbAcV0HtrSyRUorBQmXQuBJO7m1C4A",
            authDomain: "zerobaba-7733e.firebaseapp.com",
            databaseURL: "https://zerobaba-7733e-default-rtdb.firebaseio.com",
            projectId: "zerobaba-7733e",
            storageBucket: "zerobaba-7733e.firebasestorage.app",
            messagingSenderId: "20311065718",
            appId: "1:20311065718:web:5e50f0ad492d57f2518b57"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>

    <style>
        /* (احتفظ بنفس الـ CSS الموجود في ردنا السابق هنا لضمان جمالية التصميم) */
        :root { --bg-main: #0b0f19; --bg-card: #151d30; --gold: #d4af37; --green: #2ecc71; --red: #e74c3c; }
        body { background-color: var(--bg-main); color: #fff; font-family: sans-serif; text-align: center; }
        .hidden { display: none !important; }
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: var(--bg-card); border: 2px solid var(--gold); border-radius: 15px; }
        input { width: 90%; padding: 10px; margin: 10px; background: #111; color: #fff; border: 1px solid #444; }
        button { padding: 10px 20px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-page" class="auth-container">
        <h2>نظام ZeroBaba للمزادات</h2>
        <input type="text" id="auth-user" placeholder="اسم المستخدم">
        <input type="password" id="auth-pass" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>

    <div id="main-game" class="hidden">
        <h1>مرحباً بك في المزاد: <span id="lbl-username"></span></h1>
        <div id="game-content">
            <p>تم الاتصال بقاعدة بيانات: <b>zerobaba-7733e</b></p>
            <button onclick="logout()">خروج</button>
        </div>
    </div>

    <script>
        // دالة الدخول البسيطة للتأكد من الربط
        function login() {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            
            // تحقق من قاعدة البيانات
            db.ref('users/' + u).once('value').then(snap => {
                if(snap.exists() && snap.val().password === p) {
                    document.getElementById('auth-page').classList.add('hidden');
                    document.getElementById('main-game').classList.remove('hidden');
                    document.getElementById('lbl-username').innerText = u;
                } else {
                    alert("بيانات غير صحيحة أو حساب غير موجود!");
                }
            });
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
